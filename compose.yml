services:

  db:
    image: mysql
    restart: always
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD}']
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/mysql
      # - ./db/init/mysql:/docker-entrypoint-initdb.d
    env_file:
      - .env
    environment:
      # - PGDATA=/var/lib/postgresql/data/pgdata
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD?Variable not set}
      - MYSQL_DATABASE=${MYSQL_DATABASE?Variable not set}

  adminer:
    image: adminer
    restart: always
    networks:
      - traefik-public
      - default
    depends_on:
      - db
    environment:
      - ADMINER_DESIGN=pepa-linha-dark
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-http.rule=Host(`adminer.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-http.middlewares=https-redirect
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.rule=Host(`adminer.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.tls.certresolver=le
      - traefik.http.services.${STACK_NAME?Variable not set}-adminer.loadbalancer.server.port=8080

  prestart:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    build:
      context: .
      dockerfile: backend/Dockerfile
    networks:
      - traefik-public
      - default
    depends_on:
      db:
        condition: service_healthy
        restart: true
    command: bash scripts/prestart.sh
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - MYSQL_SERVER=db
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD?Variable not set}
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      # Optional -- cp hierarchy.yaml.example hierarchy.yaml to use it (see
      # hierarchy.md). If absent, Docker creates this as an empty directory
      # rather than erroring; seed_hierarchy.py's is_file() check treats
      # that the same as "not configured" and skips seeding, so this mount
      # is always safe to leave in place even when unused.
      - ./hierarchy.yaml:/app/backend/hierarchy.yaml:ro

  backend:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    restart: always
    networks:
      - traefik-public
      - default
    depends_on:
      db:
        condition: service_healthy
        restart: true
      prestart:
        condition: service_completed_successfully
      # required: false -- redis only starts under the "client" profile
      # (ROLE=server has no local ping pipeline and never touches Redis;
      # see scripts/run.sh and backend/app/main.py's lifespan gating).
      redis:
        condition: service_started
        required: false
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      # - SMTP_HOST=${SMTP_HOST}
      # - SMTP_USER=${SMTP_USER}
      # - SMTP_PASSWORD=${SMTP_PASSWORD}
      # - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - MYSQL_SERVER=db
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD?Variable not set}
      - SENTRY_DSN=${SENTRY_DSN}
      # ROLE=client (default) is a plain zone backend; ROLE=server is the
      # central argus-server (no local ping pipeline, ingestion opt-in via
      # S3_BUCKET below) -- see README.md
      - ROLE=${ROLE:-client}
      # argus-server ingestion (unset S3_BUCKET = ingestion task disabled,
      # this instance behaves as a plain zone backend -- see README.md)
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - INGESTION_INTERVAL_SECONDS=${INGESTION_INTERVAL_SECONDS:-60}
      - STALENESS_THRESHOLD_SECONDS=${STALENESS_THRESHOLD_SECONDS:-120}
      # pingsvc target hot-reload -- must match ARGUS_PINGSVC_SYNC_TOKEN
      # below (same secret-sharing pattern as MYSQL_ROOT_PASSWORD)
      - PINGSVC_SYNC_TOKEN=${PINGSVC_SYNC_TOKEN:-}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5

    build:
      context: .
      dockerfile: backend/Dockerfile
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public

      - traefik.http.services.${STACK_NAME?Variable not set}-backend.loadbalancer.server.port=8000

      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.entrypoints=http

      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.tls.certresolver=le

      # Enable redirection for HTTP and HTTPS
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.middlewares=https-redirect

  frontend:
    image: '${DOCKER_IMAGE_FRONTEND?Variable not set}:${TAG-latest}'
    build:
      context: .
      dockerfile: frontend/Dockerfile
      # dev = hot-reload Vite on 5173; prod = the static nginx stage.
      # Production deploys must set FRONTEND_TARGET=prod (and
      # FRONTEND_PORT=80) -- see deployment.md.
      target: ${FRONTEND_TARGET:-dev}
    restart: always
    networks:
      - traefik-public
      - default
    depends_on:
      backend:
        condition: service_started
    environment:
      # Compose DNS name, not localhost -- see frontend/vite.config.ts
      - VITE_API_PROXY_TARGET=http://backend:8000
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    ports:
      - "5173:5173"
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME?Variable not set}-frontend.loadbalancer.server.port=${FRONTEND_PORT:-5173}
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.rule=Host(`dashboard.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.rule=Host(`dashboard.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.tls.certresolver=le
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.middlewares=https-redirect

  # redis and pingsvc only start under the "client" profile -- a central
  # argus-server (ROLE=server) has no local devices to ping, so it never
  # needs either. Use scripts/run.sh client|server to pick the right stack.
  redis:
    image: redis:8-alpine
    restart: always
    profiles: ["client"]
    networks:
      - traefik-public
      - default
    # Do not publish port to host unless you need external access:
    # ports:
    #   - "6379:6379"
    volumes:
      - redis-data:/data

  pingsvc:
    build:
      context: ./pingsvc
      dockerfile: Dockerfile   # adjust path if needed
    image: '${DOCKER_IMAGE_PINGSVC?Variable not set}:${TAG-latest}'
    restart: always
    profiles: ["client"]
    networks:
      - traefik-public
      - default
    depends_on:
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - REDIS_URL=redis:6379
      - PINGSVC_CONCURRENCY=${PINGSVC_CONCURRENCY:-200}
      - PINGSVC_GLOBAL_QPS=${PINGSVC_GLOBAL_QPS:-500}
      - PINGSVC_PER_HOST_TIMEOUT=${PINGSVC_PER_HOST_TIMEOUT:-2s}
      # argus-client mode (unset ARGUS_ROLE = pingsvc-only, no exporter --
      # see README.md for running this as a full argus-client)
      - ARGUS_ROLE=${ARGUS_ROLE:-pingsvc}
      - ARGUS_ZONE_ID=${ARGUS_ZONE_ID:-default}
      - ARGUS_TENANT_ID=${ARGUS_TENANT_ID:-default}
      - ARGUS_SPOOL_DIR=${ARGUS_SPOOL_DIR:-/var/lib/argus/pending}
      - ARGUS_S3_BUCKET=${ARGUS_S3_BUCKET:-}
      - ARGUS_S3_REGION=${ARGUS_S3_REGION:-us-east-1}
      - ARGUS_S3_ENDPOINT=${ARGUS_S3_ENDPOINT:-}
      - ARGUS_S3_ACCESS_KEY=${ARGUS_S3_ACCESS_KEY:-}
      - ARGUS_S3_SECRET_KEY=${ARGUS_S3_SECRET_KEY:-}
      - ARGUS_SIGNING_KEY_PATH=${ARGUS_SIGNING_KEY_PATH:-}
      # Target hot-reload (optional -- empty ARGUS_BACKEND_URL disables it).
      # Compose DNS name, not localhost -- single stack, no ambiguity (see
      # frontend's VITE_API_PROXY_TARGET above for the same convention).
      - ARGUS_BACKEND_URL=${ARGUS_BACKEND_URL:-}
      - ARGUS_PINGSVC_SYNC_TOKEN=${ARGUS_PINGSVC_SYNC_TOKEN:-}
      - ARGUS_TARGET_SYNC_INTERVAL_SECONDS=${ARGUS_TARGET_SYNC_INTERVAL_SECONDS:-30}
    volumes:
      # Read-write, not :ro -- a hot reload persists the freshly-fetched
      # body here too, so a later real restart picks up the same state
      # (see targetsync.go's syncTargetsCycle). Harmless when target sync
      # is disabled: nothing else ever writes to this path.
      - ./pingsvc/targets.txt:/etc/pingsvc/targets.txt
      # Spool dir AND the Ed25519 signing key live under /var/lib/argus --
      # the key MUST persist across restarts (a regenerated key breaks the
      # server's registered-key trust model entirely, see deployment.md).
      - argus-data:/var/lib/argus
    # If your pingsvc exposes an HTTP metrics or admin port (optional), map it:
    ports:
      - "9090:9090"
    # Raw ICMP sockets -- without this every device reports down.
    cap_add:
      - NET_RAW
      - NET_ADMIN
    # No Traefik labels: pingsvc serves nothing but :9090 Prometheus
    # metrics. (Labels previously here routed api.${DOMAIN} to a port
    # pingsvc doesn't serve, colliding with the backend's router.)
    deploy:
      resources:
        limits:
          memory: 512M
volumes:
  app-db-data:
  redis-data:
  argus-data:


networks:
  traefik-public:
    # Allow setting it to false for testing
    external: true
