version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    labels: [dependencies, internal]

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    labels: [dependencies, internal]

  - package-ecosystem: gomod
    directory: /pingsvc
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    labels: [dependencies, internal]

  - package-ecosystem: docker
    directories:
      - /backend
      - /pingsvc
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    labels: [dependencies, internal]

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    labels: [dependencies, internal]
