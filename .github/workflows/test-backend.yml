name: Test Backend

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  test-backend:
    runs-on: ubuntu-latest
    env:
      MYSQL_ROOT_PASSWORD: testpassword
      MYSQL_DATABASE: argus_test
      MYSQL_SERVER: localhost
      MYSQL_PORT: 3306
      PROJECT_NAME: Argus
      SECRET_KEY: testsecretkey1234567890123456789012345
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: testpassword123
      DOMAIN: localhost
      STACK_NAME: argus
      FRONTEND_HOST: http://localhost:5173
      DOCKER_IMAGE_BACKEND: argus-backend
      DOCKER_IMAGE_PINGSVC: argus-pingsvc
      DOCKER_IMAGE_FRONTEND: argus-frontend
      REDIS_URL: redis://localhost:6379/0
      EMAILS_FROM_EMAIL: noreply@example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          MYSQL_ROOT_PASSWORD=testpassword
          MYSQL_DATABASE=argus_test
          MYSQL_SERVER=localhost
          MYSQL_PORT=3306
          PROJECT_NAME=Argus
          SECRET_KEY=testsecretkey1234567890123456789012345
          FIRST_SUPERUSER=admin@example.com
          FIRST_SUPERUSER_PASSWORD=testpassword123
          DOMAIN=localhost
          STACK_NAME=argus
          FRONTEND_HOST=http://localhost:5173
          DOCKER_IMAGE_BACKEND=argus-backend
          DOCKER_IMAGE_PINGSVC=argus-pingsvc
          DOCKER_IMAGE_FRONTEND=argus-frontend
          REDIS_URL=redis://localhost:6379/0
          EMAILS_FROM_EMAIL=noreply@example.com
          EOF
      - run: docker compose down -v --remove-orphans
      - run: docker compose up -d db redis
      - name: Migrate DB
        run: uv run bash scripts/prestart.sh
        working-directory: backend
      - name: Run tests
        run: uv run bash scripts/tests-start.sh "Coverage for ${{ github.sha }}"
        working-directory: backend
      - run: docker compose down -v --remove-orphans
      - name: Store coverage files
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: backend/htmlcov
          include-hidden-files: true
      - name: Coverage report
        run: uv run coverage report
        working-directory: backend
