name: Deploy to Staging

on:
  workflow_run:
    workflows:
      - Test Backend
      - Test pingsvc
      - Test Frontend
    types:
      - completed
    branches:
      - main

jobs:
  check-ci-status:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      actions: read
    steps:
      - name: Verify all required workflows passed for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # workflow_run fires independently per listed workflow, not once
          # all of them complete - so explicitly check every required
          # workflow's latest conclusion for this exact commit before
          # treating CI as green.
          required=("Test Backend" "Test pingsvc" "Test Frontend")
          for name in "${required[@]}"; do
            conclusion=$(gh run list --repo "$REPO" --commit "$SHA" --json name,conclusion \
              --jq ".[] | select(.name == \"$name\") | .conclusion" | head -n1)
            if [ "$conclusion" != "success" ]; then
              echo "Required workflow '$name' has not succeeded yet (conclusion: ${conclusion:-none}) for $SHA"
              exit 1
            fi
          done
          echo "All required workflows passed for $SHA"

  deploy:
    needs: check-ci-status
    runs-on:
      - self-hosted
      - staging
    env:
      ENVIRONMENT: staging
      DOMAIN: ${{ secrets.DOMAIN_STAGING }}
      STACK_NAME: ${{ secrets.STACK_NAME_STAGING }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      FIRST_SUPERUSER: ${{ secrets.FIRST_SUPERUSER }}
      FIRST_SUPERUSER_PASSWORD: ${{ secrets.FIRST_SUPERUSER_PASSWORD }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAILS_FROM_EMAIL: ${{ secrets.EMAILS_FROM_EMAIL }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
      MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
      DOCKER_IMAGE_BACKEND: ${{ secrets.DOCKER_IMAGE_BACKEND }}
      DOCKER_IMAGE_PINGSVC: ${{ secrets.DOCKER_IMAGE_PINGSVC }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
      - name: Build
        run: docker compose -f compose.yml --project-name ${{ secrets.STACK_NAME_STAGING }} build
      - name: Deploy
        run: docker compose -f compose.yml --project-name ${{ secrets.STACK_NAME_STAGING }} up -d
