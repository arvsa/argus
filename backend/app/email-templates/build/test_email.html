<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Test Email</title>
</head>
<body style="margin:0;padding:0;background-color:#fafbfc;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#fafbfc;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;padding:40px 20px;">
          <tr>
            <td align="center" style="padding:0 0 24px;">
              <h1 style="margin:0;font-size:20px;color:#333333;">{{ project_name }}</h1>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:0 25px 24px;font-size:16px;color:#555555;">
              Test email for: <strong>{{ email }}</strong>
            </td>
          </tr>
          <tr>
            <td style="border-top:2px solid #cccccc;padding-top:16px;font-size:13px;color:#999999;text-align:center;">
              This is a test email sent from {{ project_name }}.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
