<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>New Account</title>
</head>
<body style="margin:0;padding:0;background-color:#fafbfc;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#fafbfc;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;padding:40px 20px;">
          <tr>
            <td align="center" style="padding:0 0 24px;">
              <h1 style="margin:0;font-size:20px;color:#333333;">{{ project_name }} — New Account</h1>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:0 25px 16px;font-size:16px;color:#555555;">
              Welcome to your new account!
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:0 25px 8px;font-size:16px;color:#555555;">
              Username: <strong>{{ username }}</strong>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:0 25px 24px;font-size:16px;color:#555555;">
              Password: <strong>{{ password }}</strong>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:0 0 24px;">
              <a href="{{ link }}" style="display:inline-block;background-color:#009688;color:#ffffff;font-size:16px;font-weight:bold;text-decoration:none;padding:14px 28px;border-radius:8px;">Go to Dashboard</a>
            </td>
          </tr>
          <tr>
            <td style="border-top:2px solid #cccccc;padding-top:16px;font-size:13px;color:#999999;text-align:center;">
              You are receiving this email because an account was created for you.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
